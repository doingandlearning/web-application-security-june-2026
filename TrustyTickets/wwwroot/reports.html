<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Reports — TrustyTickets</title>
  <style>
    :root {
      --tt-bg: #020617;
      --tt-surface: #020617;
      --tt-border-subtle: rgba(30, 64, 175, 0.55);
      --tt-accent: #38bdf8;
      --tt-accent-soft: rgba(56, 189, 248, 0.14);
      --tt-accent-strong: #0ea5e9;
      --tt-danger: #f97373;
      --tt-text: #e5e7eb;
      --tt-text-muted: #9ca3af;
      --tt-radius-lg: 20px;
      --tt-shadow-soft: 0 22px 55px rgba(15, 23, 42, 0.9);
      --tt-shadow-focus: 0 0 0 1px rgba(148, 163, 184, 0.4), 0 0 0 4px rgba(56, 189, 248, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background:
        radial-gradient(circle at top left, #0f172a 0, #020617 55%, #000 100%);
      color: var(--tt-text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.75rem 1.25rem 2.25rem;
    }

    .page {
      width: 100%;
      max-width: 720px;
    }

    .nav-shell {
      position: sticky;
      top: 0.9rem;
      z-index: 10;
      margin: -0.25rem auto 1.5rem;
      max-width: 720px;
      padding: 0 0.1rem;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.55rem 0.8rem;
      border-radius: 999px;
      background:
        radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.18), transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.18), transparent 60%),
        linear-gradient(120deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.98));
      border: 1px solid rgba(30, 64, 175, 0.65);
      box-shadow:
        0 16px 38px rgba(15, 23, 42, 0.95),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(14px) saturate(140%);
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-links {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.15rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(30, 64, 175, 0.65);
    }

    .nav-links a {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.18rem 0.7rem;
      border-radius: 999px;
      font-size: 0.82rem;
      text-decoration: none;
      color: var(--tt-text-muted);
      border: 1px solid transparent;
      transition: background-color 0.12s ease-out, color 0.12s ease-out, border-color 0.12s ease-out;
    }

    .nav-links a[href="/reports.html"] {
      background: radial-gradient(circle at 100% 0, rgba(56, 189, 248, 0.4), transparent 60%);
      color: #e5e7eb;
      border-color: rgba(56, 189, 248, 0.8);
    }

    #logout {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.9);
      color: var(--tt-text);
      font-size: 0.78rem;
      padding: 0.32rem 0.75rem;
      cursor: pointer;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.85);
      transition: background-color 0.12s ease-out, border-color 0.12s ease-out, transform 0.08s ease-out;
    }

    #logout:hover {
      background: rgba(15, 23, 42, 0.96);
      border-color: rgba(248, 250, 252, 0.3);
      transform: translateY(-0.5px);
    }

    .surface {
      border-radius: var(--tt-radius-lg);
      padding: 1.25rem 1.25rem 1.4rem;
      background:
        radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.19), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.16), transparent 55%),
        linear-gradient(140deg, rgba(15, 23, 42, 0.97), rgba(15, 23, 42, 0.99));
      border: 1px solid rgba(15, 23, 42, 0.9);
      box-shadow: var(--tt-shadow-soft);
      backdrop-filter: blur(18px) saturate(140%);
    }

    h1 {
      margin: 0 0 0.3rem;
      font-size: 1.25rem;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 0.9rem;
      font-size: 0.85rem;
      color: var(--tt-text-muted);
    }

    .teaching-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      border: 1px dashed rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.86);
      font-size: 0.76rem;
      color: var(--tt-text-muted);
      margin-bottom: 0.85rem;
    }

    .teaching-pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #fbbf24;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.95);
    }

    .search {
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .search label {
      font-size: 0.8rem;
      color: var(--tt-text-muted);
    }

    .search input {
      padding: 0.5rem 0.75rem;
      width: 240px;
      max-width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(30, 64, 175, 0.9);
      background: rgba(15, 23, 42, 0.97);
      color: var(--tt-text);
      font-size: 0.88rem;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.9);
      transition: border-color 0.14s ease, box-shadow 0.14s ease, background-color 0.14s ease;
    }

    .search input::placeholder {
      color: rgba(148, 163, 184, 0.8);
    }

    .search input:focus {
      border-color: rgba(56, 189, 248, 0.9);
      box-shadow: var(--tt-shadow-focus);
      background: rgba(15, 23, 42, 0.99);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0 0;
      font-size: 0.88rem;
    }

    li {
      padding: 0.35rem 0.2rem;
      border-bottom: 1px dashed rgba(30, 64, 175, 0.7);
      color: rgba(226, 232, 240, 0.95);
    }

    .error {
      color: var(--tt-danger);
      font-size: 0.8rem;
      min-height: 1rem;
      margin-top: 0.2rem;
    }

    @media (max-width: 720px) {
      .surface {
        padding: 1.1rem 0.95rem 1.2rem;
      }

      nav {
        padding-inline: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="nav-shell">
    <nav>
      <div class="nav-left">
        <div class="nav-links">
          <a href="/tickets.html">Tickets</a>
          <a href="/reports.html">Reports</a>
        </div>
      </div>
      <div class="nav-right">
        <button id="logout" type="button">Log out</button>
      </div>
    </nav>
  </div>

  <div class="page">
    <div class="surface">
      <h1>Assignee report</h1>
      <p>Lab: SQLi via search. Filter assignees by name.</p>
      <div class="teaching-pill">
        <span class="teaching-pill-dot" aria-hidden="true"></span>
        Focus: SQL injection via untrusted search input.
      </div>
      <div class="search">
        <label>Filter <input type="text" id="q" placeholder="User name" /></label>
      </div>
      <div id="error" class="error" aria-live="polite"></div>
      <ul id="names"></ul>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    const qEl = document.getElementById('q');
    const namesEl = document.getElementById('names');
    const errorEl = document.getElementById('error');

    async function load() {
      const me = await api('/api/auth/me').catch(() => null);
      if (!me) { window.location.href = '/login.html'; return; }
      const q = qEl.value.trim();
      const path = '/api/reports/assignees' + (q ? '?q=' + encodeURIComponent(q) : '');
      try {
        const list = await api(path);
        namesEl.innerHTML = list.length ? list.map(n => `<li>${n}</li>`).join('') : '<li>No results</li>';
        errorEl.textContent = '';
      } catch (err) {
        errorEl.textContent = err.message;
        namesEl.innerHTML = '';
      }
    }

    qEl.addEventListener('input', load);
    qEl.addEventListener('change', load);

    document.getElementById('logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login.html';
    });

    load();
  </script>
</body>
</html>

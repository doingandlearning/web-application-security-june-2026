<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Login — TrustyTickets</title>
  <style>
    :root {
      --tt-bg: #0f172a;
      --tt-surface: #0b1120;
      --tt-surface-alt: #020617;
      --tt-border-subtle: rgba(148, 163, 184, 0.25);
      --tt-accent: #38bdf8;
      --tt-accent-soft: rgba(56, 189, 248, 0.15);
      --tt-accent-strong: #0ea5e9;
      --tt-danger: #f97373;
      --tt-text: #e5e7eb;
      --tt-text-muted: #94a3b8;
      --tt-radius-lg: 18px;
      --tt-radius-md: 10px;
      --tt-shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.7);
      --tt-shadow-focus: 0 0 0 1px rgba(148, 163, 184, 0.35), 0 0 0 4px rgba(56, 189, 248, 0.25);
      --tt-input-bg: rgba(15, 23, 42, 0.8);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.75rem 1.25rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 48%, #000 100%);
      color: var(--tt-text);
    }

    .shell {
      position: relative;
      width: 100%;
      max-width: 420px;
      background:
        radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.18), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.18), transparent 55%),
        linear-gradient(145deg, var(--tt-surface) 0, var(--tt-surface-alt) 60%, #020617 100%);
      border-radius: 24px;
      padding: 1px;
      overflow: hidden;
      box-shadow: var(--tt-shadow-soft);
      border: 1px solid rgba(148, 163, 184, 0.28);
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        conic-gradient(from 160deg, rgba(56, 189, 248, 0.12), transparent 40%, rgba(129, 140, 248, 0.12), transparent 75%, rgba(56, 189, 248, 0.12));
      opacity: 0.5;
      mix-blend-mode: screen;
      filter: blur(18px);
      pointer-events: none;
    }

    .shell-inner {
      position: relative;
      z-index: 1;
      border-radius: 23px;
      padding: 1.75rem 1.65rem 1.9rem;
      background:
        radial-gradient(circle at top left, rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.95)),
        radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.9), #020617);
      border: 1px solid rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(18px) saturate(140%);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.75rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 10%, #e0f2fe, transparent 55%),
        radial-gradient(circle at 70% 85%, #38bdf8, transparent 60%),
        radial-gradient(circle at 0 100%, #0ea5e9, transparent 55%);
      box-shadow:
        0 0 0 1px rgba(15, 23, 42, 0.9),
        0 12px 25px rgba(8, 47, 73, 0.9);
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 36%;
      border-radius: inherit;
      border: 2px solid rgba(15, 23, 42, 0.7);
      box-shadow: 0 0 0 1px rgba(248, 250, 252, 0.5);
      opacity: 0.95;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: 0.03em;
      font-weight: 600;
    }

    .subtitle {
      margin: 0;
      font-size: 0.82rem;
      color: var(--tt-text-muted);
    }

    .teaching-note {
      margin: 0.25rem 0 1.2rem;
      font-size: 0.75rem;
      padding: 0.4rem 0.65rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(15, 23, 42, 0.9);
      border: 1px dashed rgba(148, 163, 184, 0.5);
      color: var(--tt-text-muted);
    }

    .teaching-pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #fbbf24;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.95);
    }

    form {
      margin-top: 0.6rem;
    }

    label {
      display: block;
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: var(--tt-text-muted);
    }

    .field {
      margin-top: 0.25rem;
      position: relative;
    }

    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: var(--tt-radius-md);
      border: 1px solid rgba(51, 65, 85, 0.9);
      background-color: var(--tt-input-bg);
      color: var(--tt-text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease, transform 0.08s ease;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.9);
    }

    input::placeholder {
      color: rgba(148, 163, 184, 0.7);
    }

    input:focus {
      border-color: rgba(148, 163, 184, 0.95);
      background-color: rgba(15, 23, 42, 0.98);
      box-shadow: var(--tt-shadow-focus);
      transform: translateY(-0.5px);
    }

    button {
      margin-top: 1.1rem;
      width: 100%;
      padding: 0.65rem 1rem;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #0b1120;
      background: radial-gradient(circle at 0 0, #e0f2fe, transparent 60%), linear-gradient(135deg, var(--tt-accent) 0, var(--tt-accent-strong) 100%);
      box-shadow:
        0 10px 30px rgba(56, 189, 248, 0.35),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out, filter 0.08s ease-out;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow:
        0 14px 36px rgba(56, 189, 248, 0.48),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      filter: brightness(1.03);
    }

    button:active {
      transform: translateY(0);
      box-shadow:
        0 7px 20px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      filter: brightness(0.98);
    }

    .error {
      color: var(--tt-danger);
      margin-top: 0.6rem;
      font-size: 0.8rem;
      min-height: 1.1rem;
    }

    .hint-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.6rem;
      font-size: 0.76rem;
      color: var(--tt-text-muted);
      gap: 0.5rem;
    }

    .hint-pill {
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.45);
      font-size: 0.72rem;
    }

    @media (max-width: 480px) {
      .shell-inner {
        padding: 1.5rem 1.25rem 1.65rem;
      }

      h1 {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="shell-inner">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div class="brand-text">
            <h1>TrustyTickets</h1>
            <p class="subtitle">Secure-by-design ticketing sandbox</p>
          </div>
        </div>
      </div>
      <p class="teaching-note">
        <span class="teaching-pill-dot" aria-hidden="true"></span>
        Sign in (teaching: verbose errors, no rate limit).
      </p>
      <form id="loginForm">
        <label>Username
          <div class="field">
            <input type="text" name="userName" required autocomplete="username" />
          </div>
        </label>
        <label>Password
          <div class="field">
            <input type="password" name="password" required autocomplete="current-password" />
          </div>
        </label>
        <div id="error" class="error" aria-live="polite"></div>
        <button type="submit">Sign in</button>
        <div class="hint-row">
          <span>Demo credentials available in workshop notes.</span>
          <span class="hint-pill">Training instance</span>
        </div>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const errEl = document.getElementById('error');
      errEl.textContent = '';
      const userName = form.userName.value.trim();
      const password = form.password.value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ userName, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          errEl.textContent = data.error || res.statusText;
          return;
        }
        window.location.href = '/tickets.html';
      } catch (err) {
        errEl.textContent = err.message || 'Login failed';
      }
    });
  </script>
</body>
</html>

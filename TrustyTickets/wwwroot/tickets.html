<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Tickets — TrustyTickets</title>
  <style>
    :root {
      --tt-bg: #020617;
      --tt-surface: #020617;
      --tt-surface-alt: #020617;
      --tt-border-subtle: rgba(30, 64, 175, 0.45);
      --tt-accent: #38bdf8;
      --tt-accent-soft: rgba(56, 189, 248, 0.12);
      --tt-accent-strong: #0ea5e9;
      --tt-danger: #f97373;
      --tt-text: #e5e7eb;
      --tt-text-muted: #9ca3af;
      --tt-radius-lg: 20px;
      --tt-radius-md: 10px;
      --tt-shadow-soft: 0 22px 55px rgba(15, 23, 42, 0.9);
      --tt-shadow-focus: 0 0 0 1px rgba(148, 163, 184, 0.4), 0 0 0 4px rgba(56, 189, 248, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background:
        radial-gradient(circle at top left, #0f172a 0, #020617 55%, #000 100%);
      color: var(--tt-text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.75rem 1.25rem 2.25rem;
    }

    .page {
      width: 100%;
      max-width: 960px;
    }

    .nav-shell {
      position: sticky;
      top: 0.9rem;
      z-index: 10;
      margin: -0.25rem auto 1.5rem;
      max-width: 960px;
      padding: 0 0.1rem;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.55rem 0.85rem;
      border-radius: 999px;
      background:
        radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.18), transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.18), transparent 60%),
        linear-gradient(120deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.98));
      border: 1px solid rgba(30, 64, 175, 0.65);
      box-shadow:
        0 16px 38px rgba(15, 23, 42, 0.95),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(14px) saturate(140%);
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      min-width: 0;
    }

    .nav-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.2rem 0.7rem 0.2rem 0.2rem;
      border-radius: 999px;
      background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.38), transparent 60%);
    }

    .nav-dot {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 10%, #e0f2fe, transparent 55%),
        radial-gradient(circle at 80% 85%, #38bdf8, transparent 60%);
      box-shadow:
        0 0 0 1px rgba(15, 23, 42, 0.9),
        0 10px 20px rgba(15, 23, 42, 0.9);
    }

    .nav-brand span {
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }

    .nav-links {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.15rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(30, 64, 175, 0.65);
    }

    .nav-links a {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.18rem 0.7rem;
      border-radius: 999px;
      font-size: 0.82rem;
      text-decoration: none;
      color: var(--tt-text-muted);
      border: 1px solid transparent;
      transition: background-color 0.12s ease-out, color 0.12s ease-out, border-color 0.12s ease-out;
    }

    .nav-links a[href="/tickets.html"] {
      background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.4), transparent 60%);
      color: #e5e7eb;
      border-color: rgba(56, 189, 248, 0.8);
    }

    .nav-links a:hover {
      color: #e5e7eb;
      background: rgba(15, 23, 42, 0.85);
    }

    #logout {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.9);
      color: var(--tt-text);
      font-size: 0.78rem;
      padding: 0.32rem 0.75rem;
      cursor: pointer;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.85);
      transition: background-color 0.12s ease-out, border-color 0.12s ease-out, transform 0.08s ease-out;
    }

    #logout:hover {
      background: rgba(15, 23, 42, 0.96);
      border-color: rgba(248, 250, 252, 0.3);
      transform: translateY(-0.5px);
    }

    #user {
      font-size: 0.8rem;
      color: var(--tt-text-muted);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      max-width: 180px;
    }

    .surface {
      border-radius: var(--tt-radius-lg);
      padding: 1.25rem 1.25rem 1.4rem;
      background:
        radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.19), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.16), transparent 55%),
        linear-gradient(140deg, rgba(15, 23, 42, 0.97), rgba(15, 23, 42, 0.99));
      border: 1px solid rgba(15, 23, 42, 0.9);
      box-shadow: var(--tt-shadow-soft);
      backdrop-filter: blur(18px) saturate(140%);
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.25rem;
      letter-spacing: 0.02em;
    }

    .subhead {
      margin: 0 0 1.05rem;
      font-size: 0.8rem;
      color: var(--tt-text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .sub-pill {
      font-size: 0.72rem;
      padding: 0.22rem 0.7rem;
      border-radius: 999px;
      border: 1px dashed rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.85);
    }

    .search-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .search-label {
      font-size: 0.8rem;
      color: var(--tt-text-muted);
    }

    .search-input-wrap {
      position: relative;
      flex: 1 1 220px;
      max-width: 360px;
    }

    .search-input-wrap input {
      width: 100%;
      padding: 0.55rem 0.85rem 0.55rem 1.9rem;
      border-radius: 999px;
      border: 1px solid rgba(30, 64, 175, 0.85);
      background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.12), transparent 70%), rgba(15, 23, 42, 0.98);
      color: var(--tt-text);
      font-size: 0.9rem;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.9);
      transition: border-color 0.14s ease, box-shadow 0.14s ease, background-color 0.14s ease, transform 0.08s ease;
    }

    .search-input-wrap input::placeholder {
      color: rgba(148, 163, 184, 0.8);
    }

    .search-input-wrap input:focus {
      border-color: rgba(56, 189, 248, 0.9);
      box-shadow: var(--tt-shadow-focus);
      transform: translateY(-0.5px);
    }

    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(148, 163, 184, 0.9);
      box-shadow: 2px 2px 0 rgba(148, 163, 184, 0.55);
    }

    .search-icon::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 2px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.9);
      transform: rotate(48deg);
      right: -3px;
      bottom: -1px;
    }

    #newTicket {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(56, 189, 248, 0.85);
      background: var(--tt-accent-soft);
      color: #e0f2fe;
      font-size: 0.82rem;
      text-decoration: none;
      box-shadow:
        0 0 0 1px rgba(15, 23, 42, 0.9),
        0 10px 22px rgba(15, 23, 42, 0.8);
      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out, background-color 0.12s ease-out;
    }

    #newTicket:hover {
      transform: translateY(-1px);
      background: rgba(56, 189, 248, 0.2);
      box-shadow:
        0 14px 32px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(15, 23, 42, 0.9);
    }

    #newTicket::before {
      content: "+";
      font-size: 0.9rem;
    }

    .error {
      color: var(--tt-danger);
      font-size: 0.8rem;
      min-height: 1rem;
      margin-bottom: 0.3rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.4rem;
      font-size: 0.85rem;
      border-radius: 1rem;
      overflow: hidden;
      background: radial-gradient(circle at 0 0, rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.98));
      border: 1px solid rgba(30, 64, 175, 0.65);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.95);
    }

    thead {
      background: linear-gradient(120deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 1));
    }

    th,
    td {
      text-align: left;
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid rgba(30, 64, 175, 0.65);
    }

    th {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(148, 163, 184, 0.95);
      white-space: nowrap;
    }

    tbody tr:nth-child(even) {
      background: rgba(15, 23, 42, 0.96);
    }

    tbody tr:nth-child(odd) {
      background: rgba(15, 23, 42, 0.92);
    }

    tbody tr:hover {
      background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.16), rgba(15, 23, 42, 0.98));
    }

    td:nth-child(1) {
      width: 64px;
      font-variant-numeric: tabular-nums;
      color: rgba(148, 163, 184, 0.95);
    }

    td:nth-child(3) {
      white-space: nowrap;
    }

    td:nth-child(3) span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.1rem 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(30, 64, 175, 0.85);
      background: rgba(15, 23, 42, 0.9);
      font-size: 0.73rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(191, 219, 254, 0.9);
    }

    td:last-child a {
      font-size: 0.8rem;
      color: #bfdbfe;
      text-decoration: none;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      transition: background-color 0.12s ease-out, border-color 0.12s ease-out, color 0.12s ease-out;
    }

    td:last-child a:hover {
      background: rgba(37, 99, 235, 0.35);
      border-color: rgba(191, 219, 254, 0.4);
      color: #eff6ff;
    }

    @media (max-width: 720px) {
      nav {
        padding-inline: 0.7rem;
      }

      .nav-left {
        gap: 0.4rem;
      }

      #user {
        max-width: 120px;
      }

      .surface {
        padding: 1.1rem 0.95rem 1.2rem;
      }

      table {
        font-size: 0.8rem;
      }

      th,
      td {
        padding: 0.5rem 0.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="nav-shell">
    <nav>
      <div class="nav-left">
        <div class="nav-brand">
          <div class="nav-dot" aria-hidden="true"></div>
          <span>TrustyTickets</span>
        </div>
        <div class="nav-links" aria-label="Primary">
          <a href="/tickets.html">Tickets</a>
          <a href="/reports.html">Reports</a>
        </div>
      </div>
      <div class="nav-right">
        <span id="user"></span>
        <button id="logout" type="button">Log out</button>
      </div>
    </nav>
  </div>

  <div class="page">
    <div class="surface">
      <h1>Tickets</h1>
      <div class="subhead">
        <span>Browse, search and inspect tickets.</span>
        <span class="sub-pill">Search (teaching: SQLi)</span>
      </div>
      <div class="search-row">
        <div class="search-label">Search</div>
        <div class="search-input-wrap">
          <span class="search-icon" aria-hidden="true"></span>
          <input type="text" id="search" placeholder="Filter by title or description" />
        </div>
        <a href="#" id="newTicket">New ticket</a>
      </div>
      <div id="error" class="error" aria-live="polite"></div>
      <div id="list"></div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    const listEl = document.getElementById('list');
    const searchEl = document.getElementById('search');
    const errorEl = document.getElementById('error');
    const userEl = document.getElementById('user');

    async function loadMe() {
      const me = await api('/api/auth/me').catch(() => null);
      if (!me) { window.location.href = '/login.html'; return null; }
      userEl.textContent = `Hello, ${me.displayName}`;
      return me;
    }

    async function loadTickets(search) {
      const q = search ? `?search=${encodeURIComponent(search)}` : '';
      const tickets = await api('/api/tickets' + q);
      listEl.innerHTML = '<table><thead><tr><th>Id</th><th>Title</th><th>Status</th><th>Owner</th><th></th></tr></thead><tbody>' +
        tickets.map(t => `
          <tr>
            <td>${t.id}</td>
            <td>${escapeText(t.title)}</td>
            <td><span>${escapeText(t.status)}</span></td>
            <td>${escapeText(t.owner?.displayName || '')}</td>
            <td><a href="/ticket.html?id=${t.id}">View</a></td>
          </tr>
        `).join('') + '</tbody></table>';
    }
    function escapeText(s) { const div = document.createElement('div'); div.textContent = s ?? ''; return div.innerHTML; }

    searchEl.addEventListener('input', () => { errorEl.textContent = ''; loadTickets(searchEl.value.trim()); });
    searchEl.addEventListener('change', () => loadTickets(searchEl.value.trim()));

    document.getElementById('logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/login.html';
    });

    document.getElementById('newTicket').addEventListener('click', (e) => {
      e.preventDefault();
      const title = prompt('Title');
      if (!title) return;
      const description = prompt('Description (optional)');
      api('/api/tickets', { method: 'POST', body: JSON.stringify({ title, description: description || null }) })
        .then(() => loadTickets(searchEl.value.trim()))
        .catch(err => { errorEl.textContent = err.message; });
    });

    (async () => {
      if (!(await loadMe())) return;
      await loadTickets();
    })();
  </script>
</body>
</html>
